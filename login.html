<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixAdmin - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-header">
            <i class="fa-solid fa-wrench logo-icon"></i>
            <h2>FIX<span>ADMIN</span></h2>
            <p>ระบบจัดการร้านซ่อมโทรศัพท์มือถือ</p>
        </div>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">ชื่อผู้ใช้งาน</label>
                <input type="text" id="username" required placeholder="ระบุชื่อผู้ใช้">
            </div>
            <div class="input-group">
                <label for="password">รหัสผ่าน</label>
                <input type="password" id="password" required placeholder="ระบุรหัสผ่าน">
            </div>
            <p id="errorMessage" class="error-msg"></p>
            <button type="submit" class="btn-block">เข้าสู่ระบบ</button>
        </form>

        <div style="margin-top: 20px; border-top: 1px dashed #333; padding-top: 15px; text-align: center;">
    <p style="color: #888; font-size: 0.85rem; margin-bottom: 8px;">สำหรับลูกค้า: ต้องการเช็คสถานะเครื่องซ่อม?</p>
    <a href="track.html" style="display: inline-block; color: #ffc107; text-decoration: none; font-weight: bold; font-size: 0.95rem;">
        <i class="fa-solid fa-magnifying-glass"></i> คลิกที่นี่เพื่อติดตามสถานะงานซ่อม
    </a>
    
</div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            // ใช้การเปรียบเทียบโดยตรง แต่เราจะ obfuscate (ทำให้ดูยาก) เล็กน้อย
            // วิธีนี้ปลอดภัยจากการกด Inspect ดูโค้ดแบบตาเปล่า
            const u = "YWRtaW5wdWI="; // base64 ของ adminpub
            const p = "YWRtaW5wdWIwNg=="; // base64 ของ adminpub06
            
            if(btoa(user) === u && btoa(pass) === p) {
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'index.html';
            } else {
                const error = document.getElementById('errorMessage');
                error.textContent = 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง!';
                error.style.display = 'block';
            }
        });
    </script>
</body>
</html>
