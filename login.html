<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixAdmin - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-header">
            <i class="fa-solid fa-wrench logo-icon"></i>
            <h2>FIX<span>ADMIN</span></h2>
            <p>ระบบจัดการร้านซ่อมโทรศัพท์มือถือ</p>
        </div>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">ชื่อผู้ใช้งาน</label>
                <input type="text" id="username" required placeholder="ระบุชื่อผู้ใช้">
            </div>
            <div class="input-group">
                <label for="password">รหัสผ่าน</label>
                <input type="password" id="password" required placeholder="ระบุรหัสผ่าน">
            </div>
            <p id="errorMessage" class="error-msg"></p>
            <button type="submit" class="btn-block">เข้าสู่ระบบ</button>
        </form>

        <div style="margin-top: 20px; border-top: 1px dashed #333; padding-top: 15px; text-align: center;">
    <p style="color: #888; font-size: 0.85rem; margin-bottom: 8px;">สำหรับลูกค้า: ต้องการเช็คสถานะเครื่องซ่อม?</p>
    <a href="track.html" style="display: inline-block; color: #ffc107; text-decoration: none; font-weight: bold; font-size: 0.95rem;">
        <i class="fa-solid fa-magnifying-glass"></i> คลิกที่นี่เพื่อติดตามสถานะงานซ่อม
    </a>
    
</div>
    </div>
    <script>
        // นี่คือรหัสผ่านที่ถูกเข้ารหัส (SHA-256 ของ 'adminpub06')
        // แม้คนจะ Inspect ก็ไม่รู้ว่ารหัสคืออะไร
        const HASHED_PASSWORD = "3f918e6981885b57f897626941160359787e699c647b3b75438837e2898b965f";

        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            const hashedInput = await sha256(pass);

            if(user === 'adminpub' && hashedInput === HASHED_PASSWORD) {
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'index.html';
            } else {
                const error = document.getElementById('errorMessage');
                error.textContent = 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง!';
                error.style.display = 'block';
            }
        });
    </script>
</body>
</html>
