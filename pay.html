<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>FIX & PUB | Payment</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcc00; --bg: #0a0a0a; --glass: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 30px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; }
        .bank-logo { width: 80px; height: 80px; margin-bottom: 15px; border-radius: 50%; border: 2px solid var(--gold); padding: 5px; }
        h2 { color: var(--gold); margin: 0; }
        input { width: 100%; padding: 14px; margin: 8px 0; background: #1a1a1a; border: 1px solid #333; border-radius: 15px; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; background: var(--gold); color: #000; border: none; border-radius: 15px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .contact-btn { background: #333; color: white; }
        #paymentArea { display: none; }
        .qr-wrapper { background: #fff; padding: 15px; border-radius: 20px; margin: 15px 0; display: inline-block; }
        .qr-wrapper img { width: 140px; height: 140px; }
        .alert-text { color: #ff4d4d; font-weight: 600; font-size: 0.9rem; margin: 10px 0; }
        .bank-detail { color: var(--gold); font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="glass-card">
    <div id="inputArea">
        <h2>FIX & PUB</h2>
        <p>ระบุจำนวนเงินเพื่อชำระค่าบริการ</p>
        <input type="number" id="amount" placeholder="ระบุจำนวนเงิน (บาท)">
        <button class="btn" onclick="showQR()">ยืนยัน</button>
        <a href="https://www.facebook.com/yourpage"><button class="btn contact-btn">Facebook</button></a>
        <a href="https://www.instagram.com/yourpage"><button class="btn contact-btn">Instagram</button></a>
        <a href="https://line.me/ti/p/0932365807"><button class="btn contact-btn">Line: 0932365807</button></a>
    </div>

    <div id="paymentArea">
        <!-- แก้ URL รูปให้ถูกต้องตามที่อัปโหลดไว้ -->
        <img src="BAAC_Logo.svg.png" class="bank-logo" alt="BAAC">
        <h2>FIX & PUB</h2>
        <div class="qr-wrapper"><img id="qrCode" src="" alt="QR"></div>
        <div class="bank-detail">ธนาคารเพื่อการเกษตรฯ (ธ.ก.ส.)<br>เลขบัญชี: 020046774150<br>ชื่อ: ณัฐภูมิ แสงแก้ว</div>
        <p class="alert-text">⚠️ โอนแล้วแจ้งสลิปทุกครั้ง!!!</p>
        <input type="file" id="slipInput" style="background:none; border:none; margin: 10px 0;">
        <button class="btn" onclick="submitPayment()" style="background: #28a745; color: white;">อัปโหลดสลิป</button>
        <button class="btn" onclick="goBack()" style="background: #555; color: white;">ย้อนกลับ</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwKjQfzKHKMYGW746Yq8k-Xo0Sg7FfrWKtb7cvhbix356EAUCYI7m9ed6fBHg8xJw5s/exec";
    
    function showQR() {
        const amount = document.getElementById('amount').value;
        if(!amount) { alert('กรุณาระบุจำนวนเงิน'); return; }
        document.getElementById('qrCode').src = `https://promptpay.io/020046774150/${amount}.png?t=${Date.now()}`;
        document.getElementById('inputArea').style.display = 'none';
        document.getElementById('paymentArea').style.display = 'block';
    }

    function goBack() {
        document.getElementById('inputArea').style.display = 'block';
        document.getElementById('paymentArea').style.display = 'none';
    }

    function submitPayment() {
        const file = document.getElementById('slipInput').files[0];
        if(!file) { alert('เลือกสลิปด้วยครับ'); return; }
        const reader = new FileReader();
        reader.onload = function(e) {
            fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ amount: document.getElementById('amount').value, image: e.target.result })
            }).then(() => { alert("ส่งสลิปเรียบร้อย!"); location.reload(); });
        };
        reader.readAsDataURL(file);
    }
</script>
</body>
</html>
