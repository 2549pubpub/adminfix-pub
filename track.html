<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixAdmin - ตรวจสอบสถานะงานซ่อม</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* สไตล์เพิ่มเติมเฉพาะหน้าตรวจสอบสถานะ เพื่อให้แสดงผลตรงกลางจอสวยๆ */
        .track-body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle, #252525 0%, #121212 100%);
            padding: 1rem;
        }
        .track-container {
            background-color: var(--bg-card);
            padding: 2.5rem;
            border-radius: 12px;
            width: 100%;
            max-width: 550px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
        }
        .search-box input {
            flex: 1;
            padding: 0.75rem;
            background-color: #2b2b2b;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: white;
            font-size: 1.1rem;
            text-transform: uppercase; /* บังคับพิมพ์ภาษาอังกฤษเป็นตัวพิมพ์ใหญ่ */
        }
        .search-box input:focus {
            border-color: var(--yellow-primary);
            outline: none;
        }
        .btn-search {
            padding: 0.75rem 1.5rem;
            background-color: var(--yellow-primary);
            color: black;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-search:hover { background-color: var(--yellow-hover); }
        .result-box {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 1.5rem;
            border: 1px dashed var(--border-color);
            display: none; /* ซ่อนไว้ก่อน ค้นหาเจอค่อยแสดง */
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid #2b2b2b;
        }
        .result-item:last-child { border-bottom: none; }
        .result-label { color: var(--text-gray); }
        .result-value { font-weight: bold; }
    </style>
</head>
<body class="track-body">

    <div class="track-container">
        <div class="login-header">
            <i class="fa-solid fa-magnifying-glass logo-icon"></i>
            <h2>TRACK<span>STATUS</span></h2>
            <p>ระบบตรวจสอบสถานะงานซ่อมมือถือของท่าน By Nattapoom Sengkew </p>
        </div>

        <div class="search-box">
            <input type="text" id="trackIdInput" placeholder="กรอกเลขออร์เดอร์ เช่น FIX-1001" autocomplete="off">
            <button class="btn-search" id="searchBtn"><i class="fa-solid fa-search"></i> ค้นหา</button>
        </div>

        <p id="trackStatusMessage" style="text-align: center; color: var(--text-gray); display: none;"></p>

        <div class="result-box" id="resultBox">
            <div class="result-item">
                <span class="result-label">เลขออร์เดอร์</span>
                <span class="result-value text-yellow" id="resId"></span>
            </div>
            <div class="result-item">
                <span class="result-label">ชื่อลูกค้า</span>
                <span class="result-value" id="resName"></span>
            </div>
            <div class="result-item">
                <span class="result-label">รุ่นโทรศัพท์</span>
                <span class="result-value" id="resModel"></span>
            </div>
            <div class="result-item">
                <span class="result-label">อาการเสีย / รายละเอียด</span>
                <span class="result-value" id="resDetail" style="max-width: 60%; text-align: right;"></span>
            </div>
            <div class="result-item">
                <span class="result-label">ราคาค่าซ่อม</span>
                <span class="result-value text-yellow" id="resPrice"></span>
            </div>
            <div class="result-item" style="border-bottom: none; margin-top: 10px; align-items: center;">
                <span class="result-label">สถานะปัจจุบัน</span>
                <span id="resStatus"></span>
            </div>
        </div>

        <div style="margin-top: 25px; text-align: center;">
    <a href="login.html" style="color: #aaa; text-decoration: none; font-size: 0.85rem;">
        <i class="fa-solid fa-arrow-left"></i> กลับหน้าเข้าสู่ระบบ (สำหรับช่าง)
    </a>
</div>

    </div>


    <script>
        // ⚠️ สำคัญมาก: ก๊อปปี้ URL Web App ของ Google Sheets จากไฟล์ script.js มาวางตรงนี้
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxEfGqwCB1sjlWpGOkzhXOHeIwLvyueJOkA77UR97watkrmBlFQham_lP-Wz8MjbgVk/exec";

        document.getElementById('searchBtn').addEventListener('click', doTrackRepair);
        // รองรับการกดปุ่ม Enter ในการค้นหา
        document.getElementById('trackIdInput').addEventListener('keypress', function(e) {
            if (e.key === 'enter' || e.keyCode === 13) {
                doTrackRepair();
            }
        });

        function doTrackRepair() {
            const searchId = document.getElementById('trackIdInput').value.trim().toUpperCase();
            const msg = document.getElementById('trackStatusMessage');
            const resultBox = document.getElementById('resultBox');

            if (!searchId) {
                alert('กรุณากรอกเลขออร์เดอร์ก่อนครับ');
                return;
            }

            // แสดงสถานะกำลังโหลด
            resultBox.style.display = 'none';
            msg.style.display = 'block';
            msg.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> กำลังค้นหาในฐานข้อมูล...';

            // ยิงข้อมูลไปดึงจาก Google Sheets
            fetch(SCRIPT_URL)
                .then(response => response.json())
                .then(data => {
                    // ค้นหาออร์เดอร์ที่ตรงกับเลขที่ลูกค้าพิมพ์
                    const job = data.find(item => item.id.toString().trim().toUpperCase() === searchId);

                    if (job) {
                        // ปิดข้อความโหลด และเปิดกล่องแสดงผลลัพธ์
                        msg.style.display = 'none';
                        resultBox.style.display = 'block';

                        // ยัดข้อมูลลงใน Element ต่างๆ
                        document.getElementById('resId').textContent = job.id;
                        // แสดงชื่อแบบย่อเพื่อความปลอดภัยของข้อมูลลูกค้า (เช่น คุณสมชาย -> คุณสม***)
                        document.getElementById('resName').textContent = maskName(job.name);
                        document.getElementById('resModel').textContent = job.model;
                        document.getElementById('resDetail').textContent = job.detail;
                        document.getElementById('resPrice').textContent = Number(job.price).toLocaleString() + " บาท";
                        
                        // ป้ายสถานะสีตามประเภท
                        let badgeClass = '';
                        if (job.status === 'รอดำเนินการ') badgeClass = 'badge-pending';
                        if (job.status === 'กำลังซ่อม') badgeClass = 'badge-progress';
                        if (job.status === 'ซ่อมเสร็จแล้ว') badgeClass = 'badge-success';

                        document.getElementById('resStatus').className = `badge ${badgeClass}`;
                        document.getElementById('resStatus').textContent = job.status;

                    } else {
                        // กรณีค้นหาไม่เจอ
                        msg.style.display = 'block';
                        msg.style.color = '#ff4444';
                        msg.innerHTML = '<i class="fa-solid fa-circle-xmark"></i> ไม่พบเลขออร์เดอร์นี้ในระบบ กรุณาตรวจสอบอีกครั้ง';
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    msg.style.display = 'block';
                    msg.style.color = '#ff4444';
                    msg.textContent = 'เกิดข้อผิดพลาดในการเชื่อมต่อฐานข้อมูล';
                });
        }

        // ฟังก์ชันเสริมสำหรับซ่อนนามสกุลหรือชื่อท้ายลูกค้าเพื่อความเป็นส่วนตัว (Privacy)
        function maskName(name) {
            if(name.length <= 4) return name;
            return name.substring(0, 5) + "***";
        }
    </script>
</body>
</html>
