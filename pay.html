<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIX & PUB | Payment</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #0a0a0a; padding: 40px; border-radius: 20px; width: 300px; text-align: center; border: 1px solid #222; }
        .logo-box { width: 80px; height: 80px; background: #fff; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo-box img { width: 80%; }
        h2 { color: #FFD700; margin: 0 0 10px 0; font-size: 1.5rem; }
        .info { color: #888; font-size: 0.9rem; margin-bottom: 25px; }
        .qr-box { width: 200px; height: 200px; background: #fff; padding: 10px; border-radius: 10px; margin: 0 auto 10px; }
        .qr-box img { width: 100%; height: 100%; object-fit: cover; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; text-align: center; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #FFD700; color: #000; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-bottom: 15px; }
        .btn:hover { background: #e6c200; }
        .alert { color: #FFD700; font-size: 0.8rem; margin-bottom: 15px; display: block; }
        
        /* สไตล์ปุ่มติดต่อ */
        .contact-box { margin-top: 10px; border-top: 1px solid #222; padding-top: 15px; }
        .contact-btn { display: inline-block; padding: 8px 12px; margin: 0 5px; background: #111; color: #fff; text-decoration: none; border-radius: 5px; font-size: 0.75rem; border: 1px solid #333; transition: 0.2s; }
        .contact-btn:hover { background: #FFD700; color: #000; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-box">
            <img src="BAAC_Logo.svg.png" alt="Bank">
        </div>
        <h2>FIX & PUB</h2>
        <div class="info">ธ.ก.ส. (020046774150)<br>ชื่อบัญชี : ณัฐภูมิ แสงแก้ว</div>
        
        <div class="qr-box">
            <img src="f2.jpg.jpg" alt="QR Code">
        </div>
        <!-- ปุ่มดาวน์โหลดเพิ่มเข้ามา -->
        <a href="f2.jpg.jpg" download="QR_Fix_and_Pub.jpg" 
           style="display:inline-block; margin-bottom: 20px; color: #FFD700; font-size: 0.8rem; text-decoration: underline; cursor: pointer;">
           💾 ดาวน์โหลด QR Code เพื่อโอนเงิน
        </a>
        
        <input type="text" id="customerName" placeholder="ชื่อ-นามสกุล (ลูกค้า)" required>
        <input type="number" id="amount" placeholder="ระบุจำนวนเงิน (บาท)" required>
        <span class="alert">⚠️ แนบสลิปเพื่อยืนยันการชำระเงินทุกครั้ง!!!</span>
        <input type="file" id="slip">
        <button class="btn" onclick="confirmSubmit()">ยืนยันหลักฐานการโอน</button>

        <div class="contact-box">
            <span style="color: #555; font-size: 0.75rem;">ติดต่อสอบถาม/แจ้งปัญหาระบบ</span><br><br>
            <a href="https://line.me/ti/p/J98UEPZS93" class="contact-btn">LINE</a>
            <a href="https://www.facebook.com/NattaPoom49/?locale=th_TH" class="contact-btn">FB</a>
            <a href="https://www.instagram.com/nattapoom_ae/" class="contact-btn">IG</a>
        </div>
    </div>

    <!-- กล่องป๊อปอัพสีเขียว-ขาว -->
    <div id="successPopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:999; justify-content:center; align-items:center;">
        <div style="background:#fff; padding:30px; border-radius:20px; width:250px; text-align:center; color:#333; border: 5px solid #28a745;">
            <div style="font-size:50px; color:#28a745; margin-bottom:10px;">✅</div>
            <h3 style="margin:0;">บันทึกข้อมูลสำเร็จ!</h3>
            <p style="font-size:0.9rem; color:#666;">ระบบได้รับสลิปของท่านแล้ว</p>
            <button onclick="location.reload()" style="background:#28a745; color:#fff; border:none; padding:10px 20px; border-radius:10px; cursor:pointer; font-weight:bold;">ตกลง</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxRKUlICQmTZwCY5kCAj7vsmhPXvlojNkf5UgFXlAzftXjCAfLNxyFI_Lqh6zpxflwj/exec";

        function confirmSubmit() {
            const name = document.getElementById('customerName').value;
            const amt = document.getElementById('amount').value;
            const file = document.getElementById('slip').files[0];

            if(!name || !amt || !file) return alert('กรุณากรอกข้อมูลให้ครบครับ');

            if(confirm("ยืนยันข้อมูล:\nชื่อ: " + name + "\nจำนวน: " + amt + " บาท\nข้อมูลถูกต้องนะครับ?")) {
                const btn = document.querySelector('.btn');
                btn.innerText = "กำลังบันทึกข้อมูล...";
                btn.disabled = true;
                sendSlip(name, amt, file);
            }
        }

        function sendSlip(name, amt, file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ name: name, amount: amt, image: e.target.result }) })
                .then(() => { 
                    document.getElementById('successPopup').style.display = 'flex';
                });
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
